name: 每日汽车要闻总结

on:
  schedule:
    # 每天北京时间 16:30 (UTC 08:30)
    - cron: '30 8 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 安装依赖
        run: npm install
        
      - name: 执行要闻总结
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemma-4-26b-a4b-it:free' }}
          OPENROUTER_FALLBACK_MODEL: ${{ vars.OPENROUTER_FALLBACK_MODEL || 'openrouter/free' }}
        run: node scripts/daily-summary.js
