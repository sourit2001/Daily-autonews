name: 每日汽车新闻推送

on:
  schedule:
    # 每2小时运行一次
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 支持手动触发

concurrency:
  group: daily-car-news-history
  cancel-in-progress: false

jobs:
  push-car-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 安装依赖
        run: npm install
        
      - name: 执行新闻推送
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'qwen/qwen3-32b:free' }}
          OPENROUTER_FALLBACK_MODELS: ${{ vars.OPENROUTER_FALLBACK_MODELS || 'minimax/minimax-m2.5:free,z-ai/glm-4.5-air:free' }}
          SUMMARY_BATCH_SIZE: ${{ vars.SUMMARY_BATCH_SIZE || '8' }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_TABLE_ID }}

        run: node scripts/fetch-and-push.js
        
      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 仅添加历史记录文件
          if [ -f memory/car-news-pushed.json ]; then
            git add memory/car-news-pushed.json
            # 只有当 staged 有变化时才提交
            if ! git diff --staged --quiet; then
              git commit -m "Update pushed news [$(date +'%Y-%m-%d %H:%M:%S')]"
              for attempt in 1 2 3; do
                if git push origin HEAD:main; then
                  exit 0
                fi
                if [ "$attempt" -eq 3 ]; then
                  echo "Push failed after 3 attempts."
                  exit 1
                fi
                echo "Push failed; syncing origin/main before retry $((attempt + 1))/3."
                sleep $((attempt * 5))
                git fetch origin main || true
                if ! git rebase origin/main; then
                  git rebase --abort || true
                  echo "Unable to rebase the history update onto latest main."
                  exit 1
                fi
              done
            else
              echo "No new news pushed, history unchanged. Skipping commit."
            fi
          else
            echo "Memory file not found, skipping commit."
          fi
