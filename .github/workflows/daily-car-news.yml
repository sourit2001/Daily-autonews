name: 每日汽车新闻推送

on:
  schedule:
    # 每2小时运行一次
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  push-car-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 安装依赖
        run: npm install
        
      - name: 执行新闻推送
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        run: node scripts/fetch-and-push.js
        
      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 仅添加历史记录文件
          if [ -f memory/car-news-pushed.json ]; then
            git add memory/car-news-pushed.json
            # 只有当 staged 有变化时才提交
            if ! git diff --staged --quiet; then
              git commit -m "Update pushed news [$(date +'%Y-%m-%d %H:%M:%S')]"
              git push
            else
              echo "No new news pushed, history unchanged. Skipping commit."
            fi
          else
            echo "Memory file not found, skipping commit."
          fi
