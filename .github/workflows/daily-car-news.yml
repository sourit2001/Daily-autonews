name: 每日汽车新闻推送

on:
  schedule:
    # 每天早上7点（北京时间 = UTC 23:00）
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  push-car-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 安装依赖
        run: npm install cheerio axios
        
      - name: 执行新闻推送
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node scripts/fetch-and-push.js
        
      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add memory/car-news-pushed.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update pushed news [$(date)]"
          git push
